org.gradle.jvmargs=-Xmx1536m -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.configureondemand=true
org.gradle.workers.max=2
# Workaround: disable Kotlin incremental compilation to avoid daemon cache root mismatch
# See: kotlin.incremental=false prevents incremental caches referencing different drive roots
kotlin.incremental=false
# Force in-process Kotlin compiler to avoid daemon issues
kotlin.compiler.execution.strategy=in-process
# Disable kotlin daemon to avoid cross-drive cache problems
kotlin.daemon.enabled=false
android.useAndroidX=true
android.enableJetifier=false
android.defaults.buildfeatures.buildconfig=true
